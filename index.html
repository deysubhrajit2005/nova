/* ── MARKDOWN → HTML ──────────────────────────────────────── */
function md(raw) {
  if (!raw) return '';
  // Extract code blocks first to protect them
  const blocks = [];
  let s = raw.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const safe = code.trim().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const label = lang ? `<span style="font-size:.6rem;color:#555;float:right;margin-top:-2px">${esc(lang)}</span>` : '';
    blocks.push(`<pre>${label}<code>${safe}</code></pre>`);
    return `\x00B${blocks.length - 1}\x00`;
  });
  // Inline code
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // Bold & italic
  s = s.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  // Headers
  s = s.replace(/^### (.+)$/gm, '<div style="font-weight:700;font-size:.92rem;color:#e0e0f8;margin:10px 0 4px">$1</div>');
  s = s.replace(/^## (.+)$/gm,  '<div style="font-weight:800;font-size:1rem;color:#fff;margin:12px 0 5px">$1</div>');
  s = s.replace(/^# (.+)$/gm,   '<div style="font-weight:900;font-size:1.08rem;color:#fff;margin:14px 0 6px" class="aurora">$1</div>');
  // Lists
  s = s.replace(/^\d+\. (.+)$/gm, '<div style="padding:2px 0 2px 16px;color:#c8c8e0;line-height:1.65">• $1</div>');
  s = s.replace(/^[-•*] (.+)$/gm, '<div style="padding:2px 0 2px 16px;color:#c8c8e0;line-height:1.65">• $1</div>');
  // Newlines → br
  s = s.replace(/\n/g, '<br/>');
  // Restore code blocks
  s = s.replace(/\x00B(\d+)\x00/g, (_, i) => blocks[+i]);
  return s;
}

/* ── SM-2 SPACED REPETITION ───────────────────────────────── */
function sm2(quality, ef = 2.5, n = 0, interval = 1) {
  if (quality < 3) return { interval: 1, ef, n: 0, due: daysFromNow(1) };
  const ni = n === 0 ? 1 : n === 1 ? 6 : Math.round(interval * ef);
  const ne = Math.max(1.3, ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
  return { interval: ni, ef: Math.round(ne * 100) / 100, n: n + 1, due: daysFromNow(ni) };
}
function daysFromNow(d) { return new Date(Date.now() + d * 86400000).toISOString().slice(0,10); }

function buildGeminiMessages(msgs) {
  return msgs.map(m => {
    const parts = [];
    if (m.images && m.images.length > 0) {
      m.images.forEach(img => parts.push({ inlineData: { mimeType: img.type, data: img.data } }));
    }
    const text = m.content || (m.images?.length ? 'Please analyse this image and help me understand it.' : '');
    if (text) parts.push({ text });
    return { role: m.role === 'assistant' ? 'model' : 'user', parts };
  }).filter(m => m.parts.length > 0);
}

async function callGemini({ msgs, sys, maxTok = 1500, jsonMode = false }) {
  const body = {
    contents: buildGeminiMessages(msgs),
    systemInstruction: sys ? { parts: [{ text: sys }] } : undefined,
    generationConfig: {
      maxOutputTokens: maxTok,
      temperature: 0.7,
      responseMimeType: jsonMode ? 'application/json' : 'text/plain',
    }
  };
  const res = await fetch(GEMINI_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e?.error?.message || 'AI error. Please try again.');
  }
  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('') || '';
  return text;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = e => resolve({ data: e.target.result.split(',')[1], type: file.type, name: file.name });

    r.readAsDataURL(file);
  });
}

function saveState() {
  if (!S.name) return;
  LS.set(KEY, {
    name: S.name, agreed: true, xp: S.xp, streak: S.streak, lastDate: S.lastDate,
    totalQ: S.totalQ, studied: S.studied, achs: S.achs, notes: S.notes, cards: S.cards,
    lang: S.lang, battleScore: S.battleScore, summCount: S.summCount, persona: S.persona,
    goals: S.goals, subjectTime: S.subjectTime, videoCount: S.videoCount || 0
  });
}
function loadState() {
  const d = LS.get(KEY, null);
  if (d?.name && d?.agreed) {
    Object.assign(S, {
      name: d.name, xp: d.xp || 0, streak: d.streak || 0, lastDate: d.lastDate || '',
      totalQ: d.totalQ || 0, studied: d.studied || [], achs: d.achs || [],
      notes: d.notes || [], cards: d.cards || [], lang: d.lang || 'English',
      battleScore: d.battleScore || { wins: 0, losses: 0 }, summCount: d.summCount || 0,
      persona: d.persona || 'friendly', goals: d.goals || [], subjectTime: d.subjectTime || {},
      videoCount: d.videoCount || 0
    });
    return true;
  }
  return false;
}

/* ── ACHIEVEMENTS ─────────────────────────────────────────── */
function unlockAch(id) {
  if (S.achs.includes(id)) return;
  const a = ACHIEVEMENTS.find(x => x.id === id);
  if (!a) return;
  S.achs = [...S.achs, id];
  S.xp += a.xp;
  saveState();
  // Achievement popup
  const p = el('achpop');
  if (p) {
    p.innerHTML = `<div style="font-size:2rem;margin-bottom:3px">${a.icon}</div><div style="font-weight:800;color:#fff;font-size:.84rem">${a.label}</div><div style="color:#c0b0ff;font-size:.67rem;margin-top:2px">+${a.xp} XP</div>`;
    p.style.display = 'block';
    clearTimeout(p._t);
    p._t = setTimeout(() => { p.style.display = 'none'; }, 3500);
  }
  setTimeout(() => showToast(`🏅 ${a.label} +${a.xp}XP`, 3000), 80);
}
function bumpStreak() {
  const today = todayStr();
  if (S.lastDate === today) return;
  const yest = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  S.streak = S.lastDate === yest ? S.streak + 1 : 1;
  S.lastDate = today;
  if (S.streak >= 3)  setTimeout(() => unlockAch('streak3'),  100);
  if (S.streak >= 7)  setTimeout(() => unlockAch('streak7'),  200);
  if (S.streak >= 30) setTimeout(() => unlockAch('streak30'), 300);
  saveState();
}

/* ── TOAST ────────────────────────────────────────────────── */
function showToast(msg, dur = 2600) {
  clearTimeout(S._toastTimer);
  const t = el('toast');
  if (!t) return;
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  S._toastTimer = setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(8px)';
  }, dur);
}

}

function attachApp() {
  ['learn','chat','explore','cards','goals','profile'].forEach(id => {
    el(`nav-${id}`)?.addEventListener('click', () => { hap(5); S.tab = id; render(); });
  });
  if (S.tab === 'learn')   attachLearn();
  if (S.tab === 'chat')    attachChat();
  if (S.tab === 'explore') attachExplore();
  if (S.tab === 'cards')   attachCards();
  if (S.tab === 'goals')   attachGoals();
  if (S.tab === 'profile') attachProfile();
  if (S.tab === 'privview') {
    el('priv-back')?.addEventListener('click',  () => { S.tab = 'profile'; render(); });
    el('priv-back2')?.addEventListener('click', () => { S.tab = 'profile'; render(); });
  }
  if (S.videoOn)  attachVideo();
  if (S.battleOn) attachBattle();
  if (S.focusOn)  attachFocus();
  if (S.srMode)   attachSR();
}

async function sendMsg(override) {
  const inp = el('chat-inp');
  const text = (override !== undefined ? override : (inp?.value || '')).trim();
  const imgs = [...S.pendingImages];
  if ((!text && !imgs.length) || S.loading) return;
  hap();
  // Safety check
  const chk = text ? safeCheck(text) : { blocked: false, warn: null };
  if (chk.blocked) {
    S.msgs = [...S.msgs,
      { id: Date.now(),   role: 'user',      content: text, ts: nowTime() },
      { id: Date.now()+1, role: 'assistant', content: chk.reason, warn: true, ts: nowTime() }
    ];
    if (inp) inp.value = '';
    S.pendingImages = [];
    render();
    return;
  }
  // Build user message
  const userMsg = {
    id: Date.now(), role: 'user', ts: nowTime(),
    content: text || (imgs.length ? 'Please analyse this image and help me understand it.' : ''),
  };
  if (imgs.length) userMsg.images = imgs;
  S.msgs = [...S.msgs, userMsg];
  S.pendingImages = [];
  if (inp) { inp.value = ''; inp.style.height = 'auto'; }
  S.loading = true; S.searchSt = '';
  // Achievements
  S.totalQ++;
  if (S.totalQ === 1)   setTimeout(() => unlockAch('first'),  100);
  if (S.totalQ === 10)  setTimeout(() => unlockAch('q10'),    100);
  if (S.totalQ === 50)  setTimeout(() => unlockAch('q50'),    100);
  if (S.totalQ === 100) setTimeout(() => unlockAch('q100'),   100);
  if (S.totalQ === 500) setTimeout(() => unlockAch('q500'),   100);
  if (S.subject?.id && !S.studied.includes(S.subject.id)) {
    S.studied = [...S.studied, S.subject.id];
    if (S.studied.length >= 5) setTimeout(() => unlockAch('multi'), 100);
  }
  bumpStreak();
  if (imgs.length) setTimeout(() => unlockAch('photo'), 200);
  render();
  setTimeout(() => el('msgs-end')?.scrollIntoView({ behavior: 'smooth' }), 60);
  try {
    const history = S.msgs.slice(0, -1).map(m => ({ role: m.role, content: m.content, images: m.images }));
    const { text: reply, searched } = await callAI({
      msgs: [...history, { role: 'user', content: userMsg.content, images: imgs.length ? imgs : undefined }],
      sys: buildSys(S.subject?.label, S.level, S.mode, S.name, S.lang, S.persona),
      onStatus: s => { S.searchSt = s; },
    });
    S.msgs = [...S.msgs, { id: Date.now(), role: 'assistant', content: reply, searched, ts: nowTime() }];
    if (searched) setTimeout(() => unlockAch('search'), 100);
    if (chk.warn) S.msgs = [...S.msgs, { id: Date.now()+2, role: 'assistant', content: chk.warn, warn: true, ts: nowTime() }];
    saveState();
  } catch (e) {
    S.msgs = [...S.msgs, { id: Date.now(), role: 'assistant', content: `⚠️ ${e.message || 'Something went wrong. Please try again.'}`, warn: true, ts: nowTime() }];
  } finally {
    S.loading = false; S.searchSt = '';
    render();
    setTimeout(() => el('msgs-end')?.scrollIntoView({ behavior: 'smooth' }), 80);
  }
}

function doVoice() {
  hap();
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Voice input not supported on this browser'); return; }
  if (S.listening) { window._novaRec?.stop(); S.listening = false; render(); return; }
  const r = new SR();
  window._novaRec = r;
  r.lang = LANG_BCP[S.lang] || 'en-US';
  r.interimResults = false;
  r.onresult = e => {
    const inp = el('chat-inp');
    if (inp) { inp.value = e.results[0][0].transcript; inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight,120)+'px'; }
    S.listening = false;
    setTimeout(() => unlockAch('voice'), 100);
    render();
  };
  r.onerror = () => { S.listening = false; showToast('Voice failed — please try again'); render(); };
  r.onend   = () => { S.listening = false; render(); };
  r.start();
  S.listening = true;
  render();
}

async function makeCards() {
  if (S.msgs.length < 2) { showToast('Have a conversation first!'); return; }
  hap(10); showToast('⚡ Generating flashcards…');
  const convo = S.msgs.slice(-10).map(m => `${m.role}: ${(m.content||'').slice(0,300)}`).join('\n');
  try {
    const data = await callAIJson({
      prompt: `Generate exactly 5 educational flashcards from this conversation.\nReturn a JSON array: [{"q":"question","a":"detailed answer"},...]
Conversation:\n${convo}`,
      sys: 'You generate educational flashcards as JSON arrays. Exactly 5 items. Questions should test understanding, not just recall.',
      maxTok: 800,
    });
    const cards = (Array.isArray(data) ? data : []).filter(c => c.q && c.a);
    const nc = cards.map(c => ({ id: Date.now() + Math.random(), q: c.q, a: c.a, subject: S.subject?.label||'General', color: S.subject?.color||'#825AFF' }));
    S.cards = [...nc, ...S.cards].slice(0, 200);
    S.xp += 15;
    if (S.cards.length >= 10) setTimeout(() => unlockAch('cards10'), 100);
    saveState();
    showToast(`⚡ ${nc.length} cards created! +15 XP`);
    render();
  } catch { showToast('Could not generate cards — please try again'); }
}

async function doSummary() {
  if (S.msgs.length < 2) { showToast('Have a conversation first!'); return; }
  hap(10); showToast('📋 Generating summary…');
  const convo = S.msgs.slice(-12).map(m => `${m.role}: ${(m.content||'').slice(0,400)}`).join('\n');

function renderMindMap(d) {
  const W = 340, H = 300, cx = W/2, cy = H/2;
  const branches = d.branches || [];
  const lines = branches.map((b, i) => {
    const a = (i / branches.length) * 2 * Math.PI - Math.PI/2;
    const bx = cx + Math.cos(a)*90, by = cy + Math.sin(a)*90;
    const nodeLines = (b.nodes||[]).slice(0,3).map((nd,j) => {
      const a2 = a + ((j-1) / Math.max((b.nodes||[]).length,1)) * 1.0;
      const nx = bx + Math.cos(a2)*52, ny = by + Math.sin(a2)*52;
      return `<line x1="${bx}" y1="${by}" x2="${nx}" y2="${ny}" stroke="${b.color||'#825AFF'}" stroke-width="1" opacity=".25"/>
<text x="${nx}" y="${ny+3}" text-anchor="middle" fill="#666" font-size="6" font-family="Sora,sans-serif">${(nd||'').slice(0,15)}</text>`;
    }).join('');
    return `<line x1="${cx}" y1="${cy}" x2="${bx}" y2="${by}" stroke="${b.color||'#825AFF'}" stroke-width="2" opacity=".55" style="animation:mmline 1.2s ease both"/>
<circle cx="${bx}" cy="${by}" r="25" fill="${b.color||'#825AFF'}15" stroke="${b.color||'#825AFF'}" stroke-width="1.5"/>
<text x="${bx}" y="${by+4}" text-anchor="middle" fill="${b.color||'#825AFF'}" font-size="7" font-family="Sora,sans-serif" font-weight="700">${(b.label||'').slice(0,12)}</text>
${nodeLines}`;
  }).join('');
  return `<div style="padding:12px 20px 0">
    <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:12px;overflow:hidden">
      <div style="text-align:center;font-size:.67rem;color:#555;margin-bottom:8px;font-weight:600">${esc(d.center||d.topic||'')}</div>
      <svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">
        <circle cx="${cx}" cy="${cy}" r="32" fill="rgba(130,90,255,.1)" stroke="#825AFF" stroke-width="1.5"/>
        <text x="${cx}" y="${cy+4}" text-anchor="middle" fill="#a080ff" font-size="8" font-weight="800" font-family="Sora,sans-serif">${(d.center||d.topic||'').slice(0,14)}</text>
        ${lines}
      </svg>
    </div>
  </div>`;
}
async function genMindMap() {
  const topic = (el('map-inp')?.value || S.mapTopic).trim();
  if (!topic) { showToast('Enter a topic first'); return; }
  if (S.mapLoading) return;
  hap(10); S.mapLoading = true; S.mapData = null; render();
  try {
    const d = await callAIJson({
      prompt: `Create a detailed mind map for the topic: "${topic}"
Return JSON: {"center":"${topic}","branches":[{"label":"Branch Name","color":"#hexcolor","nodes":["concept1","concept2","concept3"]},...]}}
Include 5-6 branches with 2-4 nodes each. Use varied bright colours like #FF6B6B, #64B4FF, #825AFF, #26de81, #FFD93D, #FF9F43.`,
      sys: 'You generate educational mind map data as JSON only. Be specific and educational.',

    showToast('🧠 Mind map generated! +15 XP');
  } catch { showToast('Could not generate mind map — please try again'); }
  finally { S.mapLoading = false; render(); }
}

      const lbl = card.querySelector(`.card-lbl[data-id="${id}"]`);
      if (flipped.has(id)) {
        flipped.delete(id);
        if (txt) txt.textContent = c.q;
        if (lbl) lbl.textContent = 'Question';
        card.style.background = 'rgba(255,255,255,.04)';
      } else {
        flipped.add(id);
        if (txt) txt.textContent = c.a;
        if (lbl) lbl.textContent = 'Answer';
        card.style.background = 'rgba(100,180,255,.06)';
      }
    });
  });
  document.querySelectorAll('.del-card').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation(); hap();
    S.cards = S.cards.filter(c => String(c.id) !== b.dataset.id);
    saveState(); render();
  }));
}

  const ok = idx === S.battleQ.correct;
  hap(ok ? 5 : 25);
  S.battleFb = { correct: ok, msg: ok ? `⚔️ Correct! ${S.battleQ.explanation||'Well done!'}` : `💔 Wrong! ${S.battleQ.explanation || 'Correct answer: ' + S.battleQ.options[S.battleQ.correct]}` };
  S.battleHP = ok
    ? { ...S.battleHP, ai:     Math.max(0, S.battleHP.ai - 22) }
    : { ...S.battleHP, player: Math.max(0, S.battleHP.player - 28) };
  render();
  setTimeout(() => {
    if (S.battleHP.ai <= 0) {
      S.battleScore = { ...S.battleScore, wins: S.battleScore.wins + 1 };
      S.battleFb = { correct: true, msg: '🏆 YOU WIN! The AI has been defeated!' };
      unlockAch('battle'); S.xp += 50; saveState();
      render();
      setTimeout(() => { S.battleOn = false; S.battleQ = null; S.battleFb = null; render(); }, 2800);
    } else if (S.battleHP.player <= 0) {
      S.battleScore = { ...S.battleScore, losses: S.battleScore.losses + 1 };
      S.battleFb = { correct: false, msg: '💀 Defeated. Study harder and challenge me again!' };
      saveState();
      render();
      setTimeout(() => { S.battleOn = false; S.battleQ = null; S.battleFb = null; render(); }, 2800);
    } else {
      S.battleFb = null;
      loadBattleQ(S.battleSubj);
    }
  }, 2400);
}

    <button id="foc-close" class="tap" style="position:absolute;top:22px;right:22px;background:rgba(255,255,255,.07);border-radius:9px;padding:7px 12px;color:#777;font-size:.77rem;min-height:34px;cursor:pointer">✕ Close</button>

        <circle cx="91" cy="91" r="${r}" fill="none" stroke="${S.focusRun?'#825AFF':'#444'}" stroke-width="7"

          style="transition:stroke-dashoffset .9s linear,stroke .3s"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">

        <div style="font-size:.68rem;color:#555;margin-top:4px">${S.focusRun ? 'Focusing…' : 'Ready'}</div>
      </div>
    </div>

      <button id="foc-toggle" class="tap" style="background:linear-gradient(135deg,#825AFF,#64B4FF);border-radius:16px;padding:14px 30px;color:#fff;font-weight:700;font-size:.95rem;min-height:50px;cursor:pointer">${S.focusRun ? '⏸ Pause' : '▶ Start'}</button>
      <button id="foc-reset"  class="tap" style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px 20px;color:#777;font-weight:600;font-size:.88rem;min-height:50px;cursor:pointer">Reset</button>
    </div>

  </div>`;
}
function attachFocus() {
  el('foc-close')?.addEventListener('click', () => { _stopFocusTimer(); S.focusOn = false; S.focusSec = 1500; S.focusRun = false; render(); });
  el('foc-toggle')?.addEventListener('click', toggleFocus);
  el('foc-reset')?.addEventListener('click', () => { _stopFocusTimer(); S.focusSec = 1500; S.focusRun = false; render(); });
}
function _stopFocusTimer() {
  if (S._focusTimer) { clearInterval(S._focusTimer); S._focusTimer = null; }
}
function toggleFocus() {
  hap(10);
  if (S.focusRun) { _stopFocusTimer(); S.focusRun = false; render(); return; }
  S.focusDone = false; S.focusRun = true;
  render();
  S._focusTimer = setInterval(() => {
    if (!S.focusOn) { _stopFocusTimer(); return; }
    S.focusSec = Math.max(0, S.focusSec - 1);
    if (S.focusSec <= 0) {
      _stopFocusTimer();
      if (!S.focusDone) {
        S.focusDone = true; S.focusRun = false; S.focusSec = 1500;
        hap(60); S.xp += 80; unlockAch('focus'); saveState();
        showToast('⏱️ Focus session complete! +80 XP 🎉', 3500);
        render();
      }
      return;
    }
    // Update timer display directly — no full re-render
    const overlay = document.querySelector('.overlay');
    if (!overlay || !S.focusOn) return;
    const mm = Math.floor(S.focusSec/60).toString().padStart(2,'0');
    const ss = (S.focusSec%60).toString().padStart(2,'0');
    const pct = ((1500-S.focusSec)/1500)*100;
    const r = 80, circ = 2*Math.PI*r;
    const timeEl = overlay.querySelector('[style*="font-size:3.2rem"]');
    if (timeEl) timeEl.textContent = `${mm}:${ss}`;
    const circles = overlay.querySelectorAll('circle');
    if (circles[1]) circles[1].setAttribute('stroke-dashoffset', circ*(1-pct/100));
  }, 1000);
}

      prompt: `Create a cinematic 6-slide video lesson about: "${topic}" for a ${S.level} student.

{
  "type": "intro"|"concept"|"example"|"visual"|"keypoint"|"quiz",
  "title": "short punchy title (max 6 words)",
  "emoji": "one relevant emoji",
  "content": "the main explanation text (2-3 sentences max, clear and vivid)",

      maxTok: 1800,

    const slides = Array.isArray(data) ? data.slice(0, 6) : [];
    if (slides.length < 3) throw new Error('Not enough slides generated');

    S.videoSlides = slides;
    S.videoIdx = 0;

    showToast('Could not generate lesson — please try again');

  el('vid-next')?.addEventListener('click', () => {

      S.videoPlaying = false;
    } else {
      _startVideoTimer();
    }
    render();
  });
  el('vid-ask')?.addEventListener('click', () => {
    hap(8);
    const slide = S.videoSlides[S.videoIdx];
    if (!slide) return;
    _clearVideoTimer();
    S.videoOn = false;
    S.videoPlaying = false;
    // Pre-fill chat with a question about this slide
    S.tab = 'chat';
    render();
    setTimeout(() => {
      const inp = el('chat-inp');
      if (inp) {
        inp.value = `Tell me more about: "${slide.title}" — ${slide.content.slice(0,80)}`;
        inp.style.height = 'auto';
        inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
        inp.focus();
      }
    }, 120);
  });
}

function generateSlideVisual(slide, idx) {
  const c = slide.color;
  const type = slide.type;
  // Generate different SVG visuals per slide type
  const visuals = {
    intro: `<svg viewBox="0 0 280 90" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:90px">
      <defs><radialGradient id="rg${idx}" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="${c}" stop-opacity=".25"/><stop offset="100%" stop-color="${c}" stop-opacity="0"/></radialGradient></defs>
      <ellipse cx="140" cy="45" rx="120" ry="38" fill="url(#rg${idx})"/>
      <circle cx="140" cy="45" r="22" fill="${c}22" stroke="${c}" stroke-width="1.5"/>
      <circle cx="140" cy="45" r="12" fill="${c}44"/>

      ${[0,60,120,180,240,300].map((a,i)=>`<circle cx="${140+38*Math.cos(a*Math.PI/180)}" cy="${45+28*Math.sin(a*Math.PI/180)}" r="${3+i%2}" fill="${c}" opacity="${.4+i*.1}"/>`).join('')}

    concept: `<svg viewBox="0 0 280 90" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:90px">
      <rect x="20" y="20" width="60" height="50" rx="10" fill="${c}15" stroke="${c}60" stroke-width="1.5"/>
      <text x="50" y="50" text-anchor="middle" fill="${c}" font-size="20" font-family="serif">A</text>
      <line x1="82" y1="45" x2="108" y2="45" stroke="${c}80" stroke-width="2" stroke-dasharray="4,3"/>
      <polygon points="108,40 118,45 108,50" fill="${c}80"/>
      <rect x="120" y="20" width="60" height="50" rx="10" fill="${c}25" stroke="${c}" stroke-width="1.5"/>
      <text x="150" y="50" text-anchor="middle" fill="${c}" font-size="20" font-family="serif">B</text>
      <line x1="182" y1="45" x2="208" y2="45" stroke="${c}80" stroke-width="2" stroke-dasharray="4,3"/>
      <polygon points="208,40 218,45 208,50" fill="${c}80"/>
      <rect x="220" y="20" width="40" height="50" rx="10" fill="${c}35" stroke="${c}" stroke-width="1.5"/>
      <text x="240" y="50" text-anchor="middle" fill="${c}" font-size="16" font-family="serif">✓</text>
    </svg>`,
    example: `<svg viewBox="0 0 280 90" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:90px">
      ${[0,1,2,3,4].map(i=>`<rect x="${20+i*50}" y="${70-(i*10+15)}" width="36" height="${i*10+15}" rx="5" fill="${c}${Math.round(20+i*12).toString(16).padStart(2,'0')}" stroke="${c}50" stroke-width="1"/>`).join('')}
      <line x1="15" y1="72" x2="265" y2="72" stroke="${c}50" stroke-width="1.5"/>
      ${[0,1,2,3,4].map(i=>`<circle cx="${38+i*50}" cy="${70-(i*10+15)}" r="3" fill="${c}"/>`).join('')}
    </svg>`,
    visual: `<svg viewBox="0 0 280 90" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:90px">
      <circle cx="140" cy="45" r="30" fill="none" stroke="${c}" stroke-width="2" stroke-dasharray="5,3"/>
      <circle cx="80" cy="45" r="22" fill="${c}15" stroke="${c}60" stroke-width="1.5"/>
      <circle cx="200" cy="45" r="22" fill="${c}15" stroke="${c}60" stroke-width="1.5"/>
      <ellipse cx="140" cy="45" rx="20" ry="18" fill="${c}30" stroke="${c}" stroke-width="1.5"/>
      <line x1="80" y1="45" x2="120" y2="45" stroke="${c}" stroke-width="1.5"/>
      <line x1="160" y1="45" x2="200" y2="45" stroke="${c}" stroke-width="1.5"/>
      <text x="80" y="80" text-anchor="middle" fill="${c}99" font-size="9" font-family="sans-serif">Set A</text>
      <text x="140" y="80" text-anchor="middle" fill="${c}" font-size="9" font-family="sans-serif">Both</text>
      <text x="200" y="80" text-anchor="middle" fill="${c}99" font-size="9" font-family="sans-serif">Set B</text>
    </svg>`,
    keypoint: `<svg viewBox="0 0 280 90" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:90px">
      ${[0,1,2].map(i=>`
        <rect x="30" y="${15+i*25}" width="220" height="18" rx="9" fill="${c}${i===0?'30':'15'}" stroke="${c}${i===0?'80':'40'}" stroke-width="1"/>
        <circle cx="44" cy="${24+i*25}" r="5" fill="${c}${i===0?'':'60'}"/>

    quiz: `<svg viewBox="0 0 280 90" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:90px">
      <rect x="30" y="10" width="220" height="40" rx="12" fill="${c}15" stroke="${c}50" stroke-width="1.5"/>
      <text x="140" y="35" text-anchor="middle" fill="${c}" font-size="13" font-family="sans-serif" font-weight="bold">? ? ?</text>

      `).join('')}
    </svg>`,
  };
  return visuals[type] || visuals.concept;
}

/* ── BOOT SEQUENCE ────────────────────────────────────────── */
function boot() {
  S.screen = 'boot';
  render();
  setTimeout(() => {
    if (loadState()) {
      S.screen = 'app';
      render();
      setTimeout(loadDaily, 700);
    } else {
      S.screen = 'onboard';
      render();
    }
  }, 750);
}

boot();
</script>
