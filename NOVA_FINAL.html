/* ── CONSTANTS ────────────────────────────────────────────── */
const KEY  = "nova_v3";

/* ── SAFE STORAGE ─────────────────────────────────────────── */
const _mem = {};
const LS = {
  get(k, d) {
    try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : d; }
    catch { return _mem[k] !== undefined ? _mem[k] : d; }
  },
  set(k, v) {
    try { localStorage.setItem(k, JSON.stringify(v)); }
    catch { _mem[k] = v; }
  },
  clear() {
    try { localStorage.clear(); } catch {}
    Object.keys(_mem).forEach(k => delete _mem[k]);
  }
};

/* ── HELPERS ──────────────────────────────────────────────── */
const hap    = (ms = 8) => { try { navigator.vibrate?.(ms); } catch {} };
const nowTime= () => new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
const todayStr= () => new Date().toISOString().slice(0, 10);
const el     = id => document.getElementById(id);
const esc    = s => (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ── LANGUAGE MAP ─────────────────────────────────────────── */
const LANG_BCP = {
  English:'en-US', Spanish:'es-ES', French:'fr-FR', German:'de-DE',
  Chinese:'zh-CN', Japanese:'ja-JP', Arabic:'ar-SA', Hindi:'hi-IN',
  Portuguese:'pt-BR', Russian:'ru-RU', Italian:'it-IT', Korean:'ko-KR',
  Dutch:'nl-NL', Turkish:'tr-TR', Polish:'pl-PL', Swedish:'sv-SE',
};
const LANGS = Object.keys(LANG_BCP);

/* ── TTS ──────────────────────────────────────────────────── */
const TTS = (() => {
  let _voices = [];
  const loadVoices = () => { _voices = window.speechSynthesis?.getVoices() || []; };
  if (typeof window !== 'undefined') {
    loadVoices();
    window.speechSynthesis?.addEventListener?.('voiceschanged', loadVoices);
  }
  return {
    speaking: false,
    speak(text, lang = 'en-US', onEnd) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const clean = text.replace(/[*_`#\[\]>~]/g,'').replace(/<[^>]+>/g,'').slice(0, 1000);
      const u = new SpeechSynthesisUtterance(clean);
      u.rate = 0.92; u.pitch = 1.0; u.volume = 1; u.lang = lang;
      const best = _voices.find(v =>
        v.name.includes('Samantha') || v.name.includes('Karen') ||
        v.name.includes('Google UK English Female') ||
        (v.lang.startsWith(lang.slice(0,2)) && !v.localService)
      );
      if (best) u.voice = best;
      u.onstart  = () => { TTS.speaking = true; };
      u.onend    = () => { TTS.speaking = false; onEnd?.(); };
      u.onerror  = () => { TTS.speaking = false; onEnd?.(); };
      window.speechSynthesis.speak(u);
    },
    stop() { window.speechSynthesis?.cancel(); TTS.speaking = false; }
  };
})();

/* ── MARKDOWN → HTML ──────────────────────────────────────── */
function md(raw) {
  if (!raw) return '';
  // Extract code blocks first to protect them
  const blocks = [];
  let s = raw.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const safe = code.trim().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const label = lang ? `<span style="font-size:.6rem;color:#555;float:right;margin-top:-2px">${esc(lang)}</span>` : '';
    blocks.push(`<pre>${label}<code>${safe}</code></pre>`);
    return `\x00B${blocks.length - 1}\x00`;
  });
  // Inline code
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // Bold & italic
  s = s.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  // Headers
  s = s.replace(/^### (.+)$/gm, '<div style="font-weight:700;font-size:.92rem;color:#e0e0f8;margin:10px 0 4px">$1</div>');
  s = s.replace(/^## (.+)$/gm,  '<div style="font-weight:800;font-size:1rem;color:#fff;margin:12px 0 5px">$1</div>');
  s = s.replace(/^# (.+)$/gm,   '<div style="font-weight:900;font-size:1.08rem;color:#fff;margin:14px 0 6px" class="aurora">$1</div>');
  // Lists
  s = s.replace(/^\d+\. (.+)$/gm, '<div style="padding:2px 0 2px 16px;color:#c8c8e0;line-height:1.65">• $1</div>');
  s = s.replace(/^[-•*] (.+)$/gm, '<div style="padding:2px 0 2px 16px;color:#c8c8e0;line-height:1.65">• $1</div>');
  // Newlines → br
  s = s.replace(/\n/g, '<br/>');
  // Restore code blocks
  s = s.replace(/\x00B(\d+)\x00/g, (_, i) => blocks[+i]);
  return s;
}

/* ── SAFETY ───────────────────────────────────────────────── */
const BLOCKED = [
  /\b(nude|naked|porn\w*|nsfw|erotic|hentai|xxx|masturbat\w*|genitals?|sexual intercourse)\b/i,
  /\b(how to (kill|murder|stab|poison someone|blow up)|make a (bomb|explosive))\b/i,
  /\b(how to (make|synthesize) (meth|heroin|cocaine|crack|fentanyl))\b/i,
  /\b(how to (commit suicide|kill myself|self.?harm)|suicide method)\b/i,
  /\b(how to hack into|steal passwords?|ransomware code|phishing (site|kit))\b/i,
  /\b(child pornography|underage (porn|sex|nude)|grooming (children|minors?))\b/i,
];
const SENSITIVE = [
  { re:/\b(diagnose me|what disease do i have|medication dosage for me)\b/i, msg:'⚕️ For personal medical questions, please consult a qualified doctor.' },
  { re:/\b(legal advice for me|is it legal for me to|my court case)\b/i,    msg:'⚖️ For personal legal matters, please consult a qualified lawyer.' },
  { re:/\b(should i invest my money|what stocks? should i buy)\b/i,         msg:'💰 For personal financial decisions, consult a certified financial advisor.' },
];
function safeCheck(t) {
  for (const r of BLOCKED) if (r.test(t)) return { blocked: true, reason: '🚫 That content is not allowed in NOVA. This is a safe educational space.' };
  for (const { re, msg } of SENSITIVE) if (re.test(t)) return { blocked: false, warn: msg };
  return { blocked: false, warn: null };
}

/* ── SM-2 SPACED REPETITION ───────────────────────────────── */
function sm2(quality, ef = 2.5, n = 0, interval = 1) {
  if (quality < 3) return { interval: 1, ef, n: 0, due: daysFromNow(1) };
  const ni = n === 0 ? 1 : n === 1 ? 6 : Math.round(interval * ef);
  const ne = Math.max(1.3, ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
  return { interval: ni, ef: Math.round(ne * 100) / 100, n: n + 1, due: daysFromNow(ni) };
}
function daysFromNow(d) { return new Date(Date.now() + d * 86400000).toISOString().slice(0,10); }
function isDue(c) { return !c.due || c.due <= todayStr(); }

/* ── BACKEND API — Vercel (Claude powered, key hidden) ──── */
const BACKEND_URL = "https://nova-backend-yueq.vercel.app/api/chat";

async function callBackend(payload) {
  const res = await fetch(BACKEND_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e?.error || 'Server error. Please try again.');
  }
  return res.json();
}

async function callAI({ msgs, sys, onStatus, maxTok = 1500 }) {
  const data = await callBackend({ messages: msgs, system: sys, maxTokens: maxTok });
  return { text: data.text || 'No response. Please try again.', searched: false };
}

async function callAIJson({ prompt, sys, maxTok = 900 }) {
  const data = await callBackend({
    messages: [{ role: 'user', content: prompt }],
    system: (sys||'') + '\n\nRESPOND ONLY WITH VALID JSON. No markdown fences, no preamble.',
    maxTokens: maxTok
  });
  const raw = (data.text||'').replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'').trim();
  if (!raw) throw new Error('Empty response. Please try again.');
  try { return JSON.parse(raw); }
  catch { throw new Error('Invalid JSON. Please try again.'); }
}
